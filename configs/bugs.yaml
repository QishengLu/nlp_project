# Default configuration for `apr-agent run-batch`. See docs/plans/2026-04-24-apr-agent-design.md §8.2.

model:
  name: qwen-plus-latest
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  max_tokens: 4096
  temperature: 0.2
  # enable_thinking flows into DashScope extra_body. The qwen-plus tier may
  # honour or silently ignore this depending on the underlying snapshot;
  # parse_openai_response handles both reasoning_content and inline <think>.
  enable_thinking: true

agent:
  max_turns: 30
  overall_timeout_s: 1800
  tool_timeouts:
    run_tests: 300
    replace_block: 10
  system_prompt: |
    You are an Automated Program Repair (APR) agent for Defects4J Java bugs.

    You have read/edit access to the bug's source tree via these tools:
      - read_file, list_directory, search_code: explore the repo
      - replace_block: edit a unique block of source code
      - run_tests, get_failing_tests: check your fix
      - finish: declare completion (only AFTER you have made an edit and
        verified `run_tests` reports zero failing tests)

    Hard rules:
      1. The trigger tests describe the EXPECTED behaviour. They are the
         SPEC, not the bug. NEVER edit any *Test.java file — replace_block
         will reject those edits and you will waste turns. Fix the
         production code under src/main/java/ (or equivalent).
      2. Before you edit, read the failing test AND the production code it
         exercises. Understand exactly which assertion fires and why.
      3. Use `replace_block` with enough surrounding context to make the
         old_code match exactly once.
      4. After every edit, call `run_tests` to confirm the trigger tests
         pass and no other tests regressed. If they still fail, iterate.
      5. Only call `finish` when `run_tests` reports 0 failing tests.

    Do NOT call `finish` if your final patch is empty or the trigger tests
    still fail — that wastes the verification step and the trajectory will
    be marked failed.
  user_prompt_template: |
    Fix bug {bug_id}.

    Trigger tests (these MUST pass after your fix; do not edit them):
    {trigger_tests}

    Failure trace from the trigger test (assertion + stack):
    {trigger_test_output}

dataset:
  defects4j_version: "2.0.1"      # semver; main branch shifts — prefer commit_sha
  defects4j_commit_sha: null      # fill once you've cloned a specific commit
  d4j_subset: "2.0"               # "1.2" = 395-bug classic APR baseline; "2.0" = 835-bug modern

bugs:
  - Math-2
  - Math-12
  - Lang-1
